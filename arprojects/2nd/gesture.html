<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finger Launcher AR</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#cam,#canvas{
  position:absolute;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}

#canvas{
  z-index:2;
  pointer-events:none;
}

#info{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:24px;
  font-family:sans-serif;
  z-index:5;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="info">Show fingers to open apps</div>

<script>
const video=document.getElementById("cam");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const info=document.getElementById("info");

let lastGesture=0;
let stableFrames=0;

//////////////////////////////////////////////////
// COUNT OPEN FINGERS
//////////////////////////////////////////////////
function countFingers(pts){

  const tips=[8,12,16,20];
  const pips=[6,10,14,18];
  const wrist=pts[0];

  let open=0;

  for(let i=0;i<tips.length;i++){
    const tip=pts[tips[i]];
    const pip=pts[pips[i]];

    const dTip=Math.hypot(tip.x-wrist.x,tip.y-wrist.y);
    const dPip=Math.hypot(pip.x-wrist.x,pip.y-wrist.y);

    if(dTip>dPip) open++;
  }

  return open;
}

//////////////////////////////////////////////////
// OPEN WEBSITE BASED ON FINGER COUNT
//////////////////////////////////////////////////
function launchSite(count){

  switch(count){
    case 1:
      window.open("https://www.youtube.com","_blank");
      break;
    case 2:
      window.open("https://leetcode.com/problemset/","_blank");
      break;
    case 3:
      window.open("https://chat.openai.com","_blank");
      break;
    case 4:
      window.open("https://www.instagram.com","_blank");
      break;
    case 5:
      window.open("https://www.google.com","_blank");
      break;
  }
}

//////////////////////////////////////////////////
// MAIN LOOP
//////////////////////////////////////////////////
function onResults(res){

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(res.multiHandLandmarks){

    const pts=res.multiHandLandmarks[0];

    // draw skeleton
    drawConnectors(ctx,pts,HAND_CONNECTIONS,
      {color:"#00d4ff",lineWidth:3});
    drawLandmarks(ctx,pts,
      {color:"#ffffff",radius:2});

    const count=countFingers(pts);

    info.innerText="Fingers: "+count;

    if(count===lastGesture){
      stableFrames++;
    }else{
      stableFrames=0;
    }

    lastGesture=count;

    // if same gesture for 20 frames (~0.6 sec)
    if(stableFrames===20){
      launchSite(count);
    }
  }
}

//////////////////////////////////////////////////
// MEDIAPIPE SETUP
//////////////////////////////////////////////////
const hands=new Hands({
  locateFile:(f)=>
  `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.7,
  minTrackingConfidence:0.7
});

hands.onResults(onResults);

//////////////////////////////////////////////////
// CAMERA
//////////////////////////////////////////////////
const camera=new Camera(video,{
  onFrame:async()=>{
    await hands.send({image:video});
  },
  width:1280,
  height:720
});

camera.start();
</script>

</body>
</html>
